name: 🐛 Bug Report
description: Report a bug or unexpected behavior in Hermes
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: When I do X, Y happens instead of Z.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Clone the repo
        2. Run `docker compose up -d`
        3. Open the dashboard at http://localhost:9119
        4. Click on "..."
        5. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: |
        Run `docker compose logs backend` and paste relevant output.
        This will be automatically formatted as code.
      render: shell

  - type: dropdown
    id: component
    attributes:
      label: Which component is affected?
      options:
        - Backend / API
        - Frontend Dashboard
        - Agent Orchestration (DAG Planner)
        - Skills / Tools
        - RAG / Qdrant Memory
        - Telegram Bot
        - Docker / Deployment
        - Other
    validations:
      required: true

  - type: input
    id: docker_version
    attributes:
      label: Docker version
      placeholder: "e.g. 24.0.5"

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux
        - macOS
        - Windows (WSL2)
        - Windows (native)
        - Other

  - type: input
    id: llm_provider
    attributes:
      label: LLM Provider configured
      description: Which LLM API base are you using?
      placeholder: "e.g. OpenRouter / Ollama / vLLM"

  - type: checkboxes
    id: checklist
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
        - label: I am on the latest version of `main`
          required: true
