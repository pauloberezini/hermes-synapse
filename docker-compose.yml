services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: jarvis-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ${HERMES_ENV_FILE:-.env}
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - LLM_API_BASE=${LLM_API_BASE:-https://openrouter.ai/api/v1}
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_API_KEY=${OLLAMA_API_KEY:-}
      - OLLAMA_NUM_CTX=${OLLAMA_NUM_CTX:-262144}
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:--1}
      - OLLAMA_THINK=${OLLAMA_THINK:-true}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - LLM_MODEL=${LLM_MODEL:-hf.co/unsloth/Qwen3.6-35B-A3B-GGUF:UD-Q4_K_M}
      - QDRANT_HOST=qdrant
      - OBSIDIAN_HOST=host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend:/app/backend
      - ${HERMES_ENV_FILE:-.env}:/app/.env:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - qdrant
      - ollama
    networks:
      - hermes-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jarvis-dashboard
    restart: unless-stopped
    ports:
      - "9119:80"
    depends_on:
      - backend
    networks:
      - hermes-net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: jarvis-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - hermes-net

  ollama:
    image: ollama/ollama:latest
    container_name: hermes-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_CONTEXT_LENGTH=${OLLAMA_CONTEXT_LENGTH:-262144}
      - OLLAMA_FLASH_ATTENTION=${OLLAMA_FLASH_ATTENTION:-1}
      - OLLAMA_KV_CACHE_TYPE=${OLLAMA_KV_CACHE_TYPE:-q8_0}
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-1}
      - OLLAMA_MAX_LOADED_MODELS=${OLLAMA_MAX_LOADED_MODELS:-1}
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-0,1}
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - hermes-net

networks:
  hermes-net:
    driver: bridge

volumes:
  qdrant_data:
  ollama_data:
