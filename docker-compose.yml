services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: jarvis-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - LLM_API_BASE=${LLM_API_BASE:-https://openrouter.ai/api/v1}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - LLM_MODEL=${LLM_MODEL:-google/gemini-2.5-pro}
      - QDRANT_HOST=qdrant
      - OBSIDIAN_HOST=host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend:/app/backend
      - ./.env:/app/.env
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - qdrant
    networks:
      - hermes-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jarvis-dashboard
    restart: unless-stopped
    ports:
      - "9119:80"
    depends_on:
      - backend
    networks:
      - hermes-net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: jarvis-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - hermes-net

networks:
  hermes-net:
    driver: bridge

volumes:
  qdrant_data:
